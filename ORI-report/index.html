<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Memetic Weather</title>
<script>
document.documentElement.dataset.theme = localStorage.getItem("ori-theme") ||
  (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
</script>
<link rel="stylesheet" href="report.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="#weather"><span class="ori-ring"></span><span><strong id="brand-name">Community Report</strong><small>Memetic Weather / field instrument 00.3</small></span></a>
  <div class="server-picker" id="server-picker"></div>
  <span class="station-meta" id="station-meta"></span>
  <div class="filter-wrap"><button class="filter-button" id="filter-button" type="button">Full lexicon</button><div class="filter-menu" id="filter-menu"></div></div>
  <a class="small-button feed-link" href="../">Live feed</a>
  <button class="mode-button" id="theme-button" type="button">Light</button>
</header>
<nav class="chapter-nav" id="chapter-nav" aria-label="Report chapters"></nav>
<main id="deck"><div class="loading">Reading the local atmosphere…</div></main>
<div class="ori-badge">
  <div class="ori-badge-ring"><canvas id="ori-logo" title="click and hold"></canvas></div>
  <span class="ori-badge-label">Open Research Institute</span>
</div>
<script src="memetic-weather.js"></script>
<script src="topic-timeline.js"></script>
<script src="report.js"></script>
<script src="../logo.js"></script>
<script>
(function () {
  "use strict";
  const button = document.getElementById("theme-button");
  const paint = () => {
    button.textContent = document.documentElement.dataset.theme === "light" ? "Dark" : "Light";
  };
  button.onclick = () => {
    const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
    document.documentElement.dataset.theme = next;
    localStorage.setItem("ori-theme", next);
    paint();
  };
  matchMedia("(prefers-color-scheme: light)").addEventListener("change", event => {
    if (localStorage.getItem("ori-theme")) return;
    document.documentElement.dataset.theme = event.matches ? "light" : "dark";
    paint();
  });
  paint();
})();
</script>
</body>
</html>
